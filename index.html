const quick=[
  data.signup[0],
  data.signup[1],
  data.signup[2],
  data.kbeauty[0]
];

function renderLangs(){
  const box=document.getElementById("langs");
  box.innerHTML="";
  Object.keys(langInfo).forEach(k=>{
    const b=document.createElement("button");
    b.className="lang"+(k===currentLang?" active":"");
    b.innerHTML=`${langInfo[k][0]}<br>${langInfo[k][1]}`;
    b.onclick=()=>{currentLang=k;renderLangs();renderQuick();}
    box.appendChild(b);
  });
}

function renderQuick(){
  const box=document.getElementById("quick");
  box.innerHTML="";
  quick.forEach(item=>{
    const b=document.createElement("button");
    b.className="quick";
    b.innerText=item.ko;
    b.onclick=()=>openDetail(item,"빠른 응대");
    box.appendChild(b);
  });
}

function renderMenus(){
  const box=document.getElementById("menus");
  box.innerHTML="";
  Object.keys(categories).forEach(k=>{
    const b=document.createElement("button");
    b.className="menu";
    b.innerHTML=`${categories[k][0]}<span>${categories[k][1]}</span>`;
    b.onclick=()=>openList(k);
    box.appendChild(b);
  });
}

function openList(cat){
  currentCategory=cat;
  document.getElementById("listTitle").innerText=categories[cat][0];
  const list=document.getElementById("phraseList");
  list.innerHTML="";
  data[cat].forEach(item=>{
    const b=document.createElement("button");
    b.className="phrase";
    b.innerHTML=`<span>${item.ko}</span><span>›</span>`;
    b.onclick=()=>openDetail(item,categories[cat][0]);
    list.appendChild(b);
  });
  show("list");
}

function openDetail(item,title){
  currentItem=item;
  document.getElementById("detailTitle").innerText=title;
  document.getElementById("detailKo").innerText=item.ko;
  document.getElementById("detailTr").innerText=item[currentLang][0];
  document.getElementById("detailPron").innerText="발음: " + item[currentLang][1];
  show("detail");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){show("home")}
function goList(){show("list")}

function speak(){
  if(!currentItem)return;
  const text=currentItem[currentLang][0];
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang=langInfo[currentLang][2];
  utter.rate=.82;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function copy(){
  if(!currentItem)return;
  navigator.clipboard.writeText(currentItem[currentLang][0]);
  alert("복사되었습니다.");
}

renderLangs();
renderQuick();
renderMenus();
