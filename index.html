<!DOCTYPE html>

<style>
:root{
  --green:#A6CE39;
  --green2:#8DC63F;
  --deep:#2F5D20;
  --light:#F3FAE8;
  --line:#DDECCB;
  --text:#172217;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:#F3FAE8;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:white}
.header{
  padding:30px 20px 24px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:white;
  border-radius:0 0 30px 30px;
}
.header small{font-weight:900;opacity:.95;color:#f8ffe8}
.header h1{margin:8px 0 0;font-size:34px;line-height:1.05;letter-spacing:-.5px}
.header p{margin:10px 0 0;font-weight:800;color:#f8ffe8}
.section{padding:18px}
.title{font-size:17px;font-weight:950;margin:14px 0 12px}
.langs,.grid,.quickGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.quickGrid{grid-template-columns:1fr}
button{font-family:inherit;cursor:pointer;border:0}
.lang,.menu,.quick,.phrase,.featureTile{
  background:white;
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.045);
}
.lang{font-size:16px;font-weight:950}
.lang .flag{display:block;font-size:36px;margin-bottom:4px}
.lang.active{border:2px solid var(--green2);background:var(--light);color:var(--deep)}
.menu{min-height:98px;font-size:17px;font-weight:950;text-align:left}
.menu span{display:block;font-size:13px;color:#777;margin-top:7px}
.quick{
  width:100%;
  text-align:left;
  font-size:18px;
  font-weight:950;
  color:var(--deep);
  display:flex;
  align-items:center;
  gap:10px;
}
.quickIcon{font-size:26px}
.screen{display:none}
.screen.active{display:block}
.topbar{
  height:58px;
  background:var(--green2);
  color:white;
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 16px;
  font-weight:950;
  font-size:18px;
}
.back{background:transparent;color:white;font-size:30px}
.phrase{
  width:100%;
  text-align:left;
  margin-bottom:10px;
  font-size:16px;
  font-weight:900;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.detail{padding:24px 20px}
.label{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  background:var(--light);
  color:var(--deep);
  font-weight:950;
  margin-bottom:18px;
}
.ko{
  font-size:23px;
  font-weight:950;
  line-height:1.35;
  margin-bottom:24px;
  white-space:pre-line;
}
.tr{
  font-size:25px;
  line-height:1.35;
  color:var(--deep);
  font-weight:950;
  margin-bottom:24px;
  white-space:pre-line;
}
.action{
  width:100%;
  padding:17px;
  border-radius:16px;
  margin-bottom:10px;
  font-size:17px;
  font-weight:950;
}
.speak{background:var(--green2);color:white}
.copy{background:#edf7dd;color:var(--deep)}
.featureQuestionKo{
  font-size:20px;
  font-weight:950;
  margin-bottom:8px;
}
.featureQuestion{
  font-size:25px;
  line-height:1.35;
  color:var(--deep);
  font-weight:950;
  margin-bottom:18px;
}
.featureGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin:18px 0;
}
.featureTile{
  min-height:86px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  font-weight:950;
  color:var(--deep);
  background:var(--light);
  border:2px solid var(--line);
}
.notice{
  padding:14px;
  background:var(--light);
  border-radius:18px;
  font-size:13px;
  color:#555;
  line-height:1.45;
  margin-top:18px;
  text-align:center;
}
</style>
</head>

<div class="app">

  <div id="home" class="screen active">
    <div class="header">
      <small>화성향남점 거주외국인 응대</small>

      <div class="quickGrid" id="quick"></div>

      <div class="grid" id="menus"></div>

    <div class="topbar">

      <div id="listTitle"></div>
    </div>
    <div class="section" id="phraseList"></div>
  </div>

  <div id="optionScreen" class="screen">
    <div class="topbar">
      <button class="back" onclick="openList('operation')">‹</button>
      <div>기능 확인</div>
    </div>
    <div class="section">
      <div class="label">기능 확인</div>

      <div class="featureGrid" id="featureGrid"></div>

    </div>
  </div>

  <div id="detail" class="screen">
    <div class="topbar">
      <button class="back" onclick="goBackFromDetail()">‹</button>
      <div id="detailTitle"></div>
    </div>
    <div class="detail">

      <div id="detailTr" class="tr"></div>

      <button class="action copy" onclick="copy()">📋 번역문 복사</button>
    </div>
  </div>

</div>

const quick=[
  data.signup[0],
  data.signup[1],
  data.signup[2]
];

function renderLangs(){
  const box=document.getElementById("langs");
  box.innerHTML="";
  Object.keys(langInfo).forEach(k=>{
    const b=document.createElement("button");
    b.className="lang"+(k===currentLang?" active":"");
    b.innerHTML=`<span class="flag">${langInfo[k][0]}</span>${langInfo[k][1]}`;
    b.onclick=()=>{
      currentLang=k;
      renderLangs();
      renderOptions();
    };
    box.appendChild(b);
  });
}

function renderQuick(){
  const box=document.getElementById("quick");
  box.innerHTML="";
  const icons=["👤","📱","🎁"];
  quick.forEach((it,i)=>{
    const b=document.createElement("button");
    b.className="quick";
    b.innerHTML=`<span class="quickIcon">${icons[i]}</span><span>${it.label}</span>`;
    b.onclick=()=>{
      previousScreen="home";
      openDetail(it,"빠른 응대");
    };
    box.appendChild(b);
  });
}

function renderMenus(){
  const box=document.getElementById("menus");
  box.innerHTML="";
  Object.keys(categories).forEach(k=>{
    const b=document.createElement("button");
    b.className="menu";
    b.innerHTML=`${categories[k][0]}<span>${categories[k][1]}</span>`;
    b.onclick=()=>openList(k);
    box.appendChild(b);
  });
}

function openList(cat){
  currentCategory=cat;
  document.getElementById("listTitle").innerText=categories[cat][0];
  const list=document.getElementById("phraseList");
  list.innerHTML="";
  data[cat].forEach(it=>{
    const b=document.createElement("button");
    b.className="phrase";
    b.innerHTML=`<span>${it.label}</span><span>›</span>`;
    if(it.type==="options"){
      b.onclick=()=>openOptions();
    }else{
      b.onclick=()=>{
        previousScreen="list";
        openDetail(it,categories[cat][0]);
      };
    }
    list.appendChild(b);
  });
  show("list");
}

function openOptions(){
  renderOptions();
  show("optionScreen");
}

function renderOptions(){
  const q=document.getElementById("featureQuestion");
  const grid=document.getElementById("featureGrid");
  if(!q || !grid)return;

  q.innerText=optionQuestion[currentLang];
  grid.innerHTML="";

  optionItems.forEach(it=>{
    const b=document.createElement("button");
    b.className="featureTile";
    b.innerHTML=it.label[currentLang];

    b.onclick=()=>{
      previousScreen="optionScreen";
      openDetail(it,"기능 확인");
    };

    grid.appendChild(b);
  });
}

function openDetail(it,title){
  currentItem=it;

  const itemLabel = typeof it.label === "object" ? it.label.ko : it.label;

  document.getElementById("detailTitle").innerText=title;
  document.getElementById("detailLabel").innerText=itemLabel;

  const ko=document.getElementById("detailKo");
  ko.innerText=it.ko;

  if(itemLabel==="멤버십 혜택 안내"){
    ko.style.fontSize="18px";
    ko.style.lineHeight="1.6";
  }else{
    ko.style.fontSize="23px";
    ko.style.lineHeight="1.35";
  }

  const tr=document.getElementById("detailTr");
  tr.innerText=it[currentLang];

  if(itemLabel==="멤버십 혜택 안내"){
    if(currentLang==="ru"){
      tr.style.fontSize="18px";
      tr.style.lineHeight="1.45";
    }else if(currentLang==="th"){
      tr.style.fontSize="19px";
      tr.style.lineHeight="1.45";
    }else if(currentLang==="zh"){
      tr.style.fontSize="20px";
      tr.style.lineHeight="1.45";
    }else{
      tr.style.fontSize="21px";
      tr.style.lineHeight="1.45";
    }
  }else{
    tr.style.fontSize="25px";
    tr.style.lineHeight="1.35";
  }

  document.getElementById("speakBtn").innerText="🔊 음성 재생";
  show("detail");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){
  show("home");
}

function goBackFromDetail(){
  show(previousScreen);
}

function speakText(text){
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang=langInfo[currentLang][2];
  utter.rate=.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function speak(){
  if(!currentItem)return;

  const btn=document.getElementById("speakBtn");

  if(speechSynthesis.speaking){
    speechSynthesis.cancel();
    btn.innerText="🔊 음성 재생";
    return;
  }

  const utter=new SpeechSynthesisUtterance(currentItem[currentLang]);
  utter.lang=langInfo[currentLang][2];
  utter.rate=.85;

  btn.innerText="⏹ 음성 멈춤";

  utter.onend=function(){
    btn.innerText="🔊 음성 재생";
  };

  utter.onerror=function(){
    btn.innerText="🔊 음성 재생";
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function speakFeatureQuestion(){
  speakText(optionQuestion[currentLang]);
}

function copy(){
  if(!currentItem)return;
  navigator.clipboard.writeText(currentItem[currentLang]);
  alert("복사되었습니다.");
}
