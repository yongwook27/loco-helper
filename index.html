<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>화성향남점 거주외국인 응대 HELPER</title>
<style>
:root{--green:#0b7f35;--green2:#32ad4c;--light:#f2faf3;--line:#dcebdd;--text:#172217}
*{box-sizing:border-box}
body{margin:0;background:#eef6ef;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:white}
.header{padding:26px 20px 20px;background:linear-gradient(135deg,var(--green),var(--green2));color:white;border-radius:0 0 28px 28px}
.header small{font-weight:800;opacity:.9}
.header h1{margin:8px 0 0;font-size:25px;line-height:1.25}
.section{padding:18px}
.title{font-size:17px;font-weight:900;margin:12px 0}
.langs,.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
button{font-family:inherit;cursor:pointer;border:0}
.lang,.menu,.quick,.phrase,.option{background:white;border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.lang{font-size:16px;font-weight:900}
.lang .flag{display:block;font-size:34px;margin-bottom:4px}
.lang.active{border:2px solid var(--green);background:var(--light);color:var(--green)}
.menu{min-height:96px;font-size:17px;font-weight:900;text-align:left}
.menu span{display:block;font-size:13px;color:#777;margin-top:7px}
.quick{width:100%;text-align:left;margin-bottom:10px;font-size:16px;font-weight:850;color:var(--green)}
.screen{display:none}.screen.active{display:block}
.topbar{height:58px;background:var(--green);color:white;display:flex;align-items:center;gap:12px;padding:0 16px;font-weight:900;font-size:18px}
.back{background:transparent;color:white;font-size:28px}
.phrase{width:100%;text-align:left;margin-bottom:10px;font-size:16px;font-weight:850;display:flex;justify-content:space-between;align-items:center}
.detail{padding:24px 20px}
.label{display:inline-block;padding:8px 12px;border-radius:999px;background:var(--light);color:var(--green);font-weight:900;margin-bottom:18px}
.ko{font-size:25px;font-weight:950;line-height:1.35;margin-bottom:24px}
.tr{font-size:25px;line-height:1.35;color:var(--green);font-weight:900;margin-bottom:24px}
.action{width:100%;padding:17px;border-radius:16px;margin-bottom:10px;font-size:17px;font-weight:900}
.speak{background:var(--green);color:white}
.copy{background:#edf7ed;color:var(--green)}
.option{width:100%;text-align:left;margin-bottom:10px;font-size:18px;font-weight:900}
.notice{padding:14px;background:var(--light);border-radius:18px;font-size:13px;color:#555;line-height:1.45;margin-top:18px}
</style>
</head>

<body>
<div class="app">
  <div id="home" class="screen active">
    <div class="header">
      <small>화성향남점</small>
      <h1>거주외국인 응대<br>HELPER</h1>
    </div>

    <div class="section">
      <div class="title">🌐 언어 선택</div>
      <div class="langs" id="langs"></div>

      <div class="title">⚡ 빠른 응대</div>
      <div id="quick"></div>

      <div class="title">📌 상황 선택</div>
      <div class="grid" id="menus"></div>

      <div class="notice">
        키워드를 누르면 고객에게 보여줄 수 있는 문장과 번역문이 크게 표시됩니다.
      </div>
    </div>
  </div>

  <div id="list" class="screen">
    <div class="topbar">
      <button class="back" onclick="goHome()">‹</button>
      <div id="listTitle"></div>
    </div>
    <div class="section" id="phraseList"></div>
  </div>

  <div id="optionScreen" class="screen">
    <div class="topbar">
      <button class="back" onclick="openList('operation')">‹</button>
      <div>기능 선택</div>
    </div>
    <div class="section" id="optionList"></div>
  </div>

  <div id="detail" class="screen">
    <div class="topbar">
      <button class="back" onclick="goBackFromDetail()">‹</button>
      <div id="detailTitle"></div>
    </div>
    <div class="detail">
      <div id="detailLabel" class="label"></div>
      <div id="detailKo" class="ko"></div>
      <div id="detailTr" class="tr"></div>
      <button class="action speak" onclick="speak()">🔊 음성 재생</button>
      <button class="action copy" onclick="copy()">📋 번역문 복사</button>
    </div>
  </div>
</div>

const quick=[data.signup[0],data.signup[1],data.signup[2],data.kbeauty[0]];

function renderLangs(){
  const box=document.getElementById("langs");
  box.innerHTML="";
  Object.keys(langInfo).forEach(k=>{
    const b=document.createElement("button");
    b.className="lang"+(k===currentLang?" active":"");
    b.innerHTML=`<span class="flag">${langInfo[k][0]}</span>${langInfo[k][1]}`;
    b.onclick=()=>{currentLang=k;renderLangs();};
    box.appendChild(b);
  });
}

function renderQuick(){
  const box=document.getElementById("quick");
  box.innerHTML="";
  quick.forEach(it=>{
    const b=document.createElement("button");
    b.className="quick";
    b.innerText=it.label;
    b.onclick=()=>{previousScreen="home";openDetail(it,"빠른 응대");};
    box.appendChild(b);
  });
}

function renderMenus(){
  const box=document.getElementById("menus");
  box.innerHTML="";
  Object.keys(categories).forEach(k=>{
    const b=document.createElement("button");
    b.className="menu";
    b.innerHTML=`${categories[k][0]}<span>${categories[k][1]}</span>`;
    b.onclick=()=>openList(k);
    box.appendChild(b);
  });
}

function openList(cat){
  currentCategory=cat;
  document.getElementById("listTitle").innerText=categories[cat][0];
  const list=document.getElementById("phraseList");
  list.innerHTML="";
  data[cat].forEach(it=>{
    const b=document.createElement("button");
    b.className="phrase";
    b.innerHTML=`<span>${it.label}</span><span>›</span>`;
    if(it.type==="options"){b.onclick=()=>openOptions();}
    else{b.onclick=()=>{previousScreen="list";openDetail(it,categories[cat][0]);};}
    list.appendChild(b);
  });
  show("list");
}

  qbtn.className="option";
  qbtn.innerText="질문 먼저 보여주기";
  qbtn.onclick=()=>{previousScreen="optionScreen";openDetail(q,"기능 선택");};
  box.appendChild(qbtn);

  optionItems.forEach(it=>{
    const b=document.createElement("button");
    b.className="option";
    b.innerText=it.label;
    b.onclick=()=>{previousScreen="optionScreen";openDetail(it,"기능 선택");};
    box.appendChild(b);
  });
  show("optionScreen");
}

function openDetail(it,title){
  currentItem=it;
  document.getElementById("detailTitle").innerText=title;
  document.getElementById("detailLabel").innerText=it.label;
  document.getElementById("detailKo").innerText=it.ko;
  document.getElementById("detailTr").innerText=it[currentLang];
  show("detail");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){show("home");}
function goBackFromDetail(){show(previousScreen);}

function speak(){
  if(!currentItem)return;
  const utter=new SpeechSynthesisUtterance(currentItem[currentLang]);
  utter.lang=langInfo[currentLang][2];
  utter.rate=.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function copy(){
  if(!currentItem)return;
  navigator.clipboard.writeText(currentItem[currentLang]);
  alert("복사되었습니다.");
}

renderLangs();
renderQuick();
renderMenus();
</script>
</body>
</html>
